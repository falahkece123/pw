<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan DOM Vanilla JS</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #e3f2fd; /* biru muda */
        }

        .container {
            border: 2px solid #2196f3;
            padding: 20px;
            width: 300px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 10px;
        }

        label {
            display: inline-block;
            width: 80px;
            color: #0d47a1; /* biru tua */
        }

        input {
            border: 1px solid #90caf9;
            padding: 5px;
            border-radius: 5px;
        }

        button {
            margin-right: 5px;
            cursor: pointer;
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #1976d2;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="US">
        </div>

        <div class="input-group">
            <label>Sandi</label>
            <input type="password" id="S">
        </div>

        <button id="BtnLogin">Login</button>
        <button id="BtnCancel">Cancel</button>
    </div>

    <script>
        const btnLogin = document.getElementById('BtnLogin');
        const US = document.getElementById('US');

        btnLogin.addEventListener('click', jalankanAngka);

        function jalankanAngka() {
            US.value = "Username";
        }
    </script>

</body>
</html>
