<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Legends: Bang Bang — Dunia Game Mobile Terbaik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-dark:#0D2F5E;--blue-main:#1A4A9A;--blue-mid:#2262C6;--blue-light:#4A8AE8;
      --blue-pale:#D6E6FA;--yellow-main:#F5C518;--yellow-dark:#C49800;--yellow-pale:#FFF6CC;
      --white:#FFFFFF;--white-off:#F4F8FF;--text-dark:#0D1B3E;--text-mid:#1E3A70;
      --col-main:61.8%;--col-side:38.2%;--radius-sm:6px;--radius-md:12px;--radius-lg:20px;
      --shadow-z1:0 2px 6px rgba(13,47,94,0.08),0 1px 2px rgba(13,47,94,0.06);
      --shadow-z2:0 6px 18px rgba(13,47,94,0.12),0 2px 6px rgba(13,47,94,0.08);
      --shadow-z3:0 14px 36px rgba(13,47,94,0.18),0 4px 12px rgba(13,47,94,0.10);
      --shadow-z4:0 24px 60px rgba(13,47,94,0.24),0 8px 20px rgba(13,47,94,0.14);
      --shadow-yellow:0 8px 24px rgba(245,197,24,0.30);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background-color:var(--white-off);color:var(--text-dark);line-height:1.7;font-size:16px;}
    @keyframes floatA{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
    @keyframes floatB{0%,100%{transform:translateY(0px) rotate(0deg)}50%{transform:translateY(-14px) rotate(2deg)}}
    @keyframes floatC{0%,100%{transform:translateY(0px) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
    @keyframes pulseGlow{0%,100%{box-shadow:var(--shadow-yellow)}50%{box-shadow:0 12px 32px rgba(245,197,24,0.50)}}
    @keyframes toastIn{0%{opacity:0;transform:translateX(110%)}15%{opacity:1;transform:translateX(0)}80%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(110%)}}
    @keyframes toastProgress{from{transform:scaleX(1);transform-origin:left}to{transform:scaleX(0);transform-origin:left}}
    @keyframes modalIn{0%{opacity:0;transform:scale(0.88) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes overlayIn{0%{opacity:0}100%{opacity:1}}

    h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;line-height:1.2;}
    h2{font-size:clamp(1.3rem,2.5vw,1.9rem);font-weight:700;line-height:1.3;}
    h3{font-size:clamp(1rem,2vw,1.3rem);font-weight:600;}
    p{font-size:1rem;line-height:1.8;color:var(--text-mid);}
    a{color:var(--blue-mid);text-decoration:none;}
    a:hover{text-decoration:underline;}

    .navbar{background:var(--blue-dark);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--yellow-main);box-shadow:var(--shadow-z3);}
    .navbar-brand{display:flex;align-items:center;gap:10px;color:var(--white);font-weight:800;font-size:1.2rem;letter-spacing:0.5px;}
    .navbar-brand .logo-icon{width:36px;height:36px;background:var(--yellow-main);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--blue-dark);animation:floatA 3.2s ease-in-out infinite;box-shadow:var(--shadow-yellow);}
    .navbar-nav{display:flex;gap:2rem;list-style:none;}
    .navbar-nav a{color:var(--blue-pale);font-size:0.9rem;font-weight:500;transition:color 0.2s;}
    .navbar-nav a:hover{color:var(--yellow-main);text-decoration:none;}

    .hero{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue-main) 55%,var(--blue-mid) 100%);padding:6rem 5% 5rem;position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;top:-80px;right:-80px;width:380px;height:380px;background:rgba(245,197,24,0.08);border-radius:50%;animation:floatB 6s ease-in-out infinite;}
    .hero::after{content:'';position:absolute;bottom:-60px;left:20%;width:260px;height:260px;background:rgba(255,255,255,0.04);border-radius:50%;animation:floatA 5s ease-in-out infinite 1s;}
    .hero-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:var(--col-main) var(--col-side);gap:3rem;align-items:center;position:relative;z-index:2;}
    .hero-tag{display:inline-block;background:var(--yellow-main);color:var(--blue-dark);font-size:0.78rem;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:0.5px;margin-bottom:1.2rem;text-transform:uppercase;animation:pulseGlow 2.5s ease-in-out infinite;}
    .hero h1{color:var(--white);margin-bottom:1rem;}
    .hero-sub{color:var(--blue-pale);font-size:1.1rem;margin-bottom:2rem;line-height:1.7;}
    .hero-meta{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem;}
    .hero-meta-item{display:flex;align-items:center;gap:6px;color:var(--blue-pale);font-size:0.88rem;}
    .hero-meta-item .dot{width:6px;height:6px;background:var(--yellow-main);border-radius:50%;}
    .hero-cta{display:flex;gap:1rem;flex-wrap:wrap;}
    .btn-primary{background:var(--yellow-main);color:var(--blue-dark);font-weight:700;font-size:0.95rem;padding:12px 28px;border-radius:var(--radius-md);border:none;cursor:pointer;transition:background 0.2s,transform 0.2s,box-shadow 0.2s;display:inline-block;box-shadow:var(--shadow-z2);}
    .btn-primary:hover{background:var(--yellow-dark);text-decoration:none;transform:translateY(-3px);box-shadow:var(--shadow-z3);}
    .btn-primary:active{transform:translateY(-1px);}
    .btn-outline{background:transparent;color:var(--white);font-weight:600;font-size:0.95rem;padding:12px 28px;border-radius:var(--radius-md);border:2px solid rgba(255,255,255,0.35);cursor:pointer;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;display:inline-block;}
    .btn-outline:hover{border-color:var(--white);text-decoration:none;transform:translateY(-3px);box-shadow:0 8px 20px rgba(255,255,255,0.12);}
    .hero-stats{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-lg);padding:2rem;display:flex;flex-direction:column;gap:1.5rem;box-shadow:var(--shadow-z2);animation:floatC 4.5s ease-in-out infinite;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
    .stat-item{text-align:center;}
    .stat-number{font-size:2rem;font-weight:800;color:var(--yellow-main);line-height:1;}
    .stat-label{font-size:0.82rem;color:var(--blue-pale);margin-top:4px;}
    .stat-divider{height:1px;background:rgba(255,255,255,0.12);}

    .main-wrap{max-width:1200px;margin:0 auto;padding:4rem 5%;display:grid;grid-template-columns:var(--col-main) var(--col-side);gap:3rem;align-items:start;}
    .article-content{min-width:0;}
    .section-block{margin-bottom:3rem;}
    .section-label{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
    .section-label::before{content:'';display:block;width:4px;height:24px;background:var(--yellow-main);border-radius:2px;}
    .section-label h2{color:var(--text-dark);}
    .section-block p{margin-bottom:1rem;}

    .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0;}
    .role-card{background:var(--white);border:1px solid var(--blue-pale);border-radius:var(--radius-md);padding:1.2rem 1rem;text-align:center;transition:border-color 0.2s,transform 0.25s cubic-bezier(.25,.8,.25,1),box-shadow 0.25s;box-shadow:var(--shadow-z1);cursor:pointer;}
    .role-card:hover{border-color:var(--blue-main);transform:translateY(-6px);box-shadow:var(--shadow-z3);}
    .role-icon{width:44px;height:44px;margin:0 auto 0.7rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform 0.25s;}
    .role-card:hover .role-icon{transform:scale(1.15) rotate(-6deg);}
    .role-icon.tank{background:#EBF2FF;}
    .role-icon.mage{background:#EDE5FF;}
    .role-icon.marksman{background:#FFF3D6;}
    .role-icon.fighter{background:#FFEBE5;}
    .role-icon.assassin{background:#E5F7EF;}
    .role-icon.support{background:#E5EFFF;}
    .role-card h3{font-size:0.9rem;color:var(--text-dark);margin-bottom:4px;}
    .role-card p{font-size:0.8rem;color:#5A7AB0;line-height:1.5;margin:0;}

    .feature-list{list-style:none;margin:1rem 0;}
    .feature-list li{display:flex;align-items:flex-start;gap:10px;padding:0.6rem 0;border-bottom:1px solid var(--blue-pale);font-size:0.95rem;color:var(--text-mid);transition:background 0.15s,padding-left 0.2s;border-radius:var(--radius-sm);}
    .feature-list li:last-child{border-bottom:none;}
    .feature-list li:hover{padding-left:6px;background:var(--white-off);}
    .feature-list li::before{content:'';flex-shrink:0;width:8px;height:8px;background:var(--yellow-main);border-radius:50%;margin-top:7px;}

    .tier-table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:0.9rem;box-shadow:var(--shadow-z1);border-radius:var(--radius-md);overflow:hidden;}
    .tier-table th{background:var(--blue-main);color:var(--white);padding:10px 14px;text-align:left;font-weight:600;}
    .tier-table td{padding:10px 14px;border-bottom:1px solid var(--blue-pale);color:var(--text-mid);transition:background 0.15s;}
    .tier-table tr:nth-child(even) td{background:var(--white-off);}
    .tier-table tr:hover td{background:var(--blue-pale);}
    .tier-table tbody tr{cursor:pointer;}
    .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.78rem;font-weight:700;}
    .badge-s{background:#FFF3D6;color:#7A5800;}
    .badge-a{background:#E5F0FF;color:#1A4A9A;}
    .badge-b{background:#EEF8F0;color:#1A6B2E;}

    .quote-block{background:var(--blue-dark);border-left:5px solid var(--yellow-main);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:1.5rem 1.8rem;margin:2rem 0;box-shadow:var(--shadow-z2);transition:transform 0.25s,box-shadow 0.25s;}
    .quote-block:hover{transform:translateX(4px);box-shadow:var(--shadow-z3);}
    .quote-block p{color:var(--blue-pale);font-size:1.05rem;font-style:italic;line-height:1.75;margin:0;}

    .tips-box{background:var(--yellow-pale);border:1px solid #E8C900;border-radius:var(--radius-md);padding:1.5rem;margin:1.5rem 0;box-shadow:var(--shadow-z1);transition:transform 0.25s,box-shadow 0.25s;}
    .tips-box:hover{transform:translateY(-3px);box-shadow:var(--shadow-z2);}
    .tips-box-title{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--blue-dark);margin-bottom:1rem;font-size:1rem;}
    .tips-icon{width:24px;height:24px;background:var(--yellow-main);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--blue-dark);}
    .tips-box ul{list-style:none;}
    .tips-box ul li{color:var(--text-mid);font-size:0.92rem;padding:5px 0;padding-left:1.2rem;position:relative;}
    .tips-box ul li::before{content:'→';position:absolute;left:0;color:var(--yellow-dark);font-weight:700;}

    .sidebar{position:sticky;top:80px;}
    .sidebar-card{background:var(--white);border:1px solid var(--blue-pale);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow-z2);transition:transform 0.3s cubic-bezier(.25,.8,.25,1),box-shadow 0.3s;}
    .sidebar-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-z3);}
    .sidebar-card:nth-child(1){animation:floatA 5s ease-in-out infinite;}
    .sidebar-card:nth-child(2){animation:floatA 5.5s ease-in-out infinite 0.5s;}
    .sidebar-card:nth-child(3){animation:floatA 6s ease-in-out infinite 1s;}
    .sidebar-card-head{background:var(--blue-main);padding:0.85rem 1.2rem;display:flex;align-items:center;gap:8px;}
    .sidebar-card-head h3{color:var(--white);font-size:0.95rem;font-weight:600;}
    .sidebar-card-head-icon{width:22px;height:22px;background:rgba(245,197,24,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
    .sidebar-card-body{padding:1.2rem;}
    .toc-list{list-style:none;}
    .toc-list li{padding:6px 0;border-bottom:1px solid var(--blue-pale);}
    .toc-list li:last-child{border-bottom:none;}
    .toc-list a{color:var(--text-mid);font-size:0.88rem;display:flex;align-items:center;gap:8px;transition:color 0.2s;}
    .toc-list a:hover{color:var(--blue-mid);text-decoration:none;}
    .toc-num{width:20px;height:20px;background:var(--blue-pale);color:var(--blue-main);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0;}
    .fact-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--blue-pale);font-size:0.88rem;}
    .fact-row:last-child{border-bottom:none;}
    .fact-row .fact-key{color:#6B84B0;font-weight:500;}
    .fact-row .fact-val{color:var(--text-dark);font-weight:600;text-align:right;}
    .rating-box{text-align:center;padding:1rem 0;}
    .rating-score{font-size:3rem;font-weight:900;color:var(--yellow-main);line-height:1;text-shadow:0 4px 12px rgba(245,197,24,0.35);}
    .rating-label{font-size:0.85rem;color:#6B84B0;margin-top:4px;}
    .stars{display:flex;justify-content:center;gap:4px;margin:8px 0;}
    .star{width:16px;height:16px;background:var(--yellow-main);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
    .star.half{opacity:0.4;}

    .info-banner{background:var(--blue-main);padding:3rem 5%;}
    .info-banner-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;}
    .info-stat{text-align:center;padding:1.5rem;background:rgba(255,255,255,0.08);border-radius:var(--radius-md);border:1px solid rgba(255,255,255,0.12);box-shadow:var(--shadow-z1);transition:transform 0.3s,box-shadow 0.3s;}
    .info-stat:hover{transform:translateY(-6px) scale(1.02);box-shadow:var(--shadow-z3);}
    .info-stat .num{font-size:2.2rem;font-weight:900;color:var(--yellow-main);line-height:1;}
    .info-stat .lbl{font-size:0.85rem;color:var(--blue-pale);margin-top:6px;}

    .footer{background:var(--blue-dark);padding:3rem 5% 2rem;border-top:3px solid var(--yellow-main);box-shadow:0 -4px 20px rgba(13,47,94,0.3);}
    .footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:var(--col-main) var(--col-side);gap:3rem;padding-bottom:2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
    .footer-brand{color:var(--white);font-weight:800;font-size:1.1rem;margin-bottom:0.75rem;}
    .footer-desc{color:var(--blue-pale);font-size:0.88rem;line-height:1.7;}
    .footer-links h4{color:var(--yellow-main);font-size:0.85rem;letter-spacing:0.5px;margin-bottom:1rem;text-transform:uppercase;}
    .footer-links ul{list-style:none;}
    .footer-links ul li{margin-bottom:0.5rem;}
    .footer-links ul li a{color:var(--blue-pale);font-size:0.88rem;transition:color 0.2s;}
    .footer-links ul li a:hover{color:var(--yellow-main);text-decoration:none;}
    .footer-copy{max-width:1200px;margin:1.5rem auto 0;color:#5A7AB0;font-size:0.82rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}

    /* === TOAST (untuk navigasi & tier list) === */
    #toast-container{position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
    .toast{display:flex;align-items:flex-start;gap:12px;background:var(--white);border-radius:var(--radius-md);padding:14px 18px;min-width:280px;max-width:340px;box-shadow:var(--shadow-z4);border-left:4px solid var(--blue-main);pointer-events:all;animation:toastIn 3.8s ease forwards;position:relative;overflow:hidden;}
    .toast::after{content:'';position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--yellow-main),transparent);width:100%;animation:toastProgress 3.8s linear forwards;}
    .toast.toast-success{border-left-color:#1A9E5A;}
    .toast.toast-warning{border-left-color:var(--yellow-dark);}
    .toast.toast-error{border-left-color:#C0332B;}
    .toast.toast-info{border-left-color:var(--blue-mid);}
    .toast-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;}
    .toast-success .toast-icon{background:#D4F5E5;color:#0F6E3A;}
    .toast-warning .toast-icon{background:var(--yellow-pale);color:var(--yellow-dark);}
    .toast-error .toast-icon{background:#FAE5E4;color:#C0332B;}
    .toast-info .toast-icon{background:var(--blue-pale);color:var(--blue-mid);}
    .toast-body{flex:1;}
    .toast-title{font-size:0.88rem;font-weight:700;color:var(--text-dark);margin-bottom:2px;}
    .toast-msg{font-size:0.82rem;color:#6B84B0;line-height:1.5;}

    /* === HERO ROLE MODAL === */
    #hero-modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(8,18,45,0.72);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      z-index:8888;
      align-items:center;
      justify-content:center;
      animation:overlayIn 0.25s ease;
    }
    #hero-modal-overlay.active{display:flex;}

    #hero-modal{
      background:var(--white);
      border-radius:var(--radius-lg);
      padding:2.2rem 2rem 1.8rem;
      max-width:420px;
      width:90%;
      box-shadow:var(--shadow-z4);
      position:relative;
      animation:modalIn 0.3s cubic-bezier(.25,.8,.25,1);
      border-top:4px solid var(--yellow-main);
    }

    #hero-modal-close{
      position:absolute;
      top:14px;right:16px;
      width:32px;height:32px;
      background:var(--blue-pale);
      border:none;
      border-radius:50%;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;
      color:var(--blue-dark);
      font-weight:700;
      transition:background 0.2s,transform 0.2s;
      line-height:1;
    }
    #hero-modal-close:hover{background:var(--blue-light);color:var(--white);transform:scale(1.1);}

    .modal-role-icon-wrap{
      width:64px;height:64px;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:30px;
      margin:0 auto 1rem;
    }
    .modal-role-icon-wrap.tank{background:#EBF2FF;}
    .modal-role-icon-wrap.mage{background:#EDE5FF;}
    .modal-role-icon-wrap.marksman{background:#FFF3D6;}
    .modal-role-icon-wrap.fighter{background:#FFEBE5;}
    .modal-role-icon-wrap.assassin{background:#E5F7EF;}
    .modal-role-icon-wrap.support{background:#E5EFFF;}

    #hero-modal h3{text-align:center;color:var(--text-dark);font-size:1.3rem;margin-bottom:0.4rem;}
    #hero-modal-desc{text-align:center;color:var(--text-mid);font-size:0.95rem;line-height:1.7;margin:0;}
    #hero-modal-tip{
      margin-top:1.2rem;
      background:var(--yellow-pale);
      border:1px solid #E8C900;
      border-radius:var(--radius-md);
      padding:0.9rem 1rem;
      font-size:0.88rem;
      color:var(--blue-dark);
      line-height:1.6;
    }
    #hero-modal-tip strong{color:var(--yellow-dark);}

    .modal-footer-btn{
      margin-top:1.5rem;
      display:flex;
      justify-content:center;
    }
    .modal-footer-btn button{
      background:var(--blue-main);
      color:var(--white);
      border:none;
      padding:10px 32px;
      border-radius:var(--radius-md);
      font-weight:700;
      font-size:0.95rem;
      cursor:pointer;
      transition:background 0.2s,transform 0.2s;
    }
    .modal-footer-btn button:hover{background:var(--blue-dark);transform:translateY(-2px);}

    .cta-download{background:var(--blue-main);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;box-shadow:var(--shadow-z2);animation:floatA 5.8s ease-in-out infinite 1.2s;transition:transform 0.3s,box-shadow 0.3s;}
    .cta-download:hover{transform:translateY(-6px);box-shadow:var(--shadow-z4);animation-play-state:paused;}
    .cta-download .btn-primary,.cta-download .btn-outline{display:block;border-radius:8px;}
    .cta-download .btn-primary{margin-bottom:0.6rem;}

    @media(max-width:900px){
      .hero-inner,.main-wrap,.footer-inner,.info-banner-inner{grid-template-columns:1fr;}
      .hero-stats{flex-direction:row;flex-wrap:wrap;justify-content:center;animation:none;}
      .hero-stats .stat-divider{display:none;}
      .sidebar{position:static;}
      .sidebar-card{animation:none;}
      .role-grid{grid-template-columns:repeat(2,1fr);}
      .info-banner-inner{grid-template-columns:repeat(2,1fr);}
      .navbar-nav{display:none;}
      #toast-container{right:12px;left:12px;top:72px;}
      .toast{min-width:unset;max-width:100%;}
    }
    @media(max-width:480px){
      .role-grid{grid-template-columns:1fr 1fr;}
      .hero{padding:4rem 5% 3rem;}
    }
  </style>
</head>
