<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Legends: Bang Bang — Dunia Game Mobile Terbaik</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:   #0D2F5E;
      --blue-main:   #1A4A9A;
      --blue-mid:    #2262C6;
      --blue-light:  #4A8AE8;
      --blue-pale:   #D6E6FA;
      --yellow-main: #F5C518;
      --yellow-dark: #C49800;
      --yellow-pale: #FFF6CC;
      --white:       #FFFFFF;
      --white-off:   #F4F8FF;
      --text-dark:   #0D1B3E;
      --text-mid:    #1E3A70;
      --text-light:  #FFFFFF;
      --golden:      1.618;
      --col-main:    61.8%;
      --col-side:    38.2%;
      --radius-sm:   6px;
      --radius-md:   12px;
      --radius-lg:   20px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--white-off);
      color: var(--text-dark);
      line-height: 1.7;
      font-size: 16px;
    }

    /* ===== TYPOGRAPHY ===== */
    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.2; }
    h2 { font-size: clamp(1.3rem, 2.5vw, 1.9rem); font-weight: 700; line-height: 1.3; }
    h3 { font-size: clamp(1rem, 2vw, 1.3rem); font-weight: 600; }
    p  { font-size: 1rem; line-height: 1.8; color: var(--text-mid); }

    a { color: var(--blue-mid); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: var(--blue-dark);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid var(--yellow-main);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .navbar-brand .logo-icon {
      width: 36px; height: 36px;
      background: var(--yellow-main);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: var(--blue-dark);
    }

    .navbar-nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .navbar-nav a {
      color: var(--blue-pale);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .navbar-nav a:hover { color: var(--yellow-main); text-decoration: none; }

    .navbar-badge {
      background: var(--yellow-main);
      color: var(--blue-dark);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-main) 55%, var(--blue-mid) 100%);
      padding: 6rem 5% 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 380px; height: 380px;
      background: rgba(245,197,24,0.08);
      border-radius: 50%;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 20%;
      width: 260px; height: 260px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--col-main) var(--col-side);
      gap: 3rem;
      align-items: center;
    }

    .hero-tag {
      display: inline-block;
      background: var(--yellow-main);
      color: var(--blue-dark);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    .hero h1 { color: var(--white); margin-bottom: 1rem; }

    .hero-sub {
      color: var(--blue-pale);
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .hero-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
