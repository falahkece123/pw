<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Legends: Bang Bang — Dunia Game Mobile Terbaik</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark:   #0D2F5E;
      --blue-main:   #1A4A9A;
      --blue-mid:    #2262C6;
      --blue-light:  #4A8AE8;
      --blue-pale:   #D6E6FA;
      --yellow-main: #F5C518;
      --yellow-dark: #C49800;
      --yellow-pale: #FFF6CC;
      --white:       #FFFFFF;
      --white-off:   #F4F8FF;
      --text-dark:   #0D1B3E;
      --text-mid:    #1E3A70;
      --text-light:  #FFFFFF;
      --golden:      1.618;
      --col-main:    61.8%;
      --col-side:    38.2%;
      --radius-sm:   6px;
      --radius-md:   12px;
      --radius-lg:   20px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--white-off);
      color: var(--text-dark);
      line-height: 1.7;
      font-size: 16px;
    }

    /* ===== TYPOGRAPHY ===== */
    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.2; }
    h2 { font-size: clamp(1.3rem, 2.5vw, 1.9rem); font-weight: 700; line-height: 1.3; }
    h3 { font-size: clamp(1rem, 2vw, 1.3rem); font-weight: 600; }
    p  { font-size: 1rem; line-height: 1.8; color: var(--text-mid); }

    a { color: var(--blue-mid); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: var(--blue-dark);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid var(--yellow-main);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .navbar-brand .logo-icon {
      width: 36px; height: 36px;
      background: var(--yellow-main);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: var(--blue-dark);
    }

    .navbar-nav {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .navbar-nav a {
      color: var(--blue-pale);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .navbar-nav a:hover { color: var(--yellow-main); text-decoration: none; }

    .navbar-badge {
      background: var(--yellow-main);
      color: var(--blue-dark);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-main) 55%, var(--blue-mid) 100%);
      padding: 6rem 5% 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 380px; height: 380px;
      background: rgba(245,197,24,0.08);
      border-radius: 50%;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 20%;
      width: 260px; height: 260px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--col-main) var(--col-side);
      gap: 3rem;
      align-items: center;
    }

    .hero-tag {
      display: inline-block;
      background: var(--yellow-main);
      color: var(--blue-dark);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    .hero h1 { color: var(--white); margin-bottom: 1rem; }

    .hero-sub {
      color: var(--blue-pale);
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .hero-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
.hero-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--blue-pale);
      font-size: 0.88rem;
    }

    .hero-meta-item .dot {
      width: 6px; height: 6px;
      background: var(--yellow-main);
      border-radius: 50%;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--yellow-main);
      color: var(--blue-dark);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: inline-block;
    }
    .btn-primary:hover { background: var(--yellow-dark); text-decoration: none; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: var(--white);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      border: 2px solid rgba(255,255,255,0.35);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
      display: inline-block;
    }
    .btn-outline:hover { border-color: var(--white); text-decoration: none; transform: translateY(-1px); }

    /* Hero stats */
    .hero-stats {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .stat-item { text-align: center; }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--yellow-main);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.82rem;
      color: var(--blue-pale);
      margin-top: 4px;
    }
    .stat-divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* ===== MAIN LAYOUT ===== */
    .main-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 5%;
      display: grid;
      grid-template-columns: var(--col-main) var(--col-side);
      gap: 3rem;
      align-items: start;
    }

    /* ===== ARTICLE CONTENT ===== */
    .article-content { min-width: 0; }

    .section-block { margin-bottom: 3rem; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 4px;
      height: 24px;
      background: var(--yellow-main);
      border-radius: 2px;
    }

    .section-label h2 { color: var(--text-dark); }

    .section-block p { margin-bottom: 1rem; }

    /* Role Grid */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .role-card {
      background: var(--white);
      border: 1px solid var(--blue-pale);
      border-radius: var(--radius-md);
      padding: 1.2rem 1rem;
      text-align: center;
      transition: border-color 0.2s, transform 0.15s;
    }
    .role-card:hover { border-color: var(--blue-main); transform: translateY(-3px); }

    .role-icon {
      width: 44px; height: 44px;
      margin: 0 auto 0.7rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .role-icon.tank    { background: #EBF2FF; }
    .role-icon.mage    { background: #EDE5FF; }
    .role-icon.marksman{ background: #FFF3D6; }
    .role-icon.fighter { background: #FFEBE5; }
    .role-icon.assassin{ background: #E5F7EF; }
    .role-icon.support { background: #E5EFFF; }

    .role-card h3 { font-size: 0.9rem; color: var(--text-dark); margin-bottom: 4px; }
    .role-card p  { font-size: 0.8rem; color: #5A7AB0; line-height: 1.5; margin: 0; }

    /* Feature List */
    .feature-list { list-style: none; margin: 1rem 0; }
    .feature-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--blue-pale);
      font-size: 0.95rem;
      color: var(--text-mid);
    }
    .feature-list li:last-child { border-bottom: none; }
    .feature-list li::before {
      content: '';
      flex-shrink: 0;
      width: 8px; height: 8px;
      background: var(--yellow-main);
      border-radius: 50%;
      margin-top: 7px;
    }

    /* Tier Table */
    .tier-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }
    .tier-table th {
      background: var(--blue-main);
      color: var(--white);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
    }
    .tier-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    .tier-table th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }
    .tier-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--blue-pale);
      color: var(--text-mid);
    }
    .tier-table tr:nth-child(even) td { background: var(--white-off); }
    .tier-table tr:hover td { background: var(--blue-pale); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .badge-s { background: #FFF3D6; color: #7A5800; }
    .badge-a { background: #E5F0FF; color: #1A4A9A; }
    .badge-b { background: #EEF8F0; color: #1A6B2E; }
    /* Quote Block */
    .quote-block {
      background: var(--blue-dark);
      border-left: 5px solid var(--yellow-main);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      padding: 1.5rem 1.8rem;
      margin: 2rem 0;
    }
    .quote-block p {
      color: var(--blue-pale);
      font-size: 1.05rem;
      font-style: italic;
      line-height: 1.75;
      margin: 0;
    }

    /* Tips Box */
    .tips-box {
      background: var(--yellow-pale);
      border: 1px solid #E8C900;
      border-radius: var(--radius-md);
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .tips-box-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .tips-icon {
      width: 24px; height: 24px;
      background: var(--yellow-main);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: var(--blue-dark);
    }
    .tips-box ul { list-style: none; }
    .tips-box ul li {
      color: var(--text-mid);
      font-size: 0.92rem;
      padding: 5px 0;
      padding-left: 1.2rem;
      position: relative;
    }
    .tips-box ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--yellow-dark);
      font-weight: 700;
    }

    /* ===== SIDEBAR ===== */
    .sidebar { position: sticky; top: 80px; }

    .sidebar-card {
      background: var(--white);
      border: 1px solid var(--blue-pale);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .sidebar-card-head {
      background: var(--blue-main);
      padding: 0.85rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-card-head h3 { color: var(--white); font-size: 0.95rem; font-weight: 600; }
    .sidebar-card-head-icon {
      width: 22px; height: 22px;
      background: rgba(245,197,24,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .sidebar-card-body { padding: 1.2rem; }

    /* TOC */
    .toc-list { list-style: none; }
    .toc-list li { padding: 6px 0; border-bottom: 1px solid var(--blue-pale); }
    .toc-list li:last-child { border-bottom: none; }
    .toc-list a {
      color: var(--text-mid);
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .toc-list a:hover { color: var(--blue-mid); text-decoration: none; }
    .toc-num {
      width: 20px; height: 20px;
      background: var(--blue-pale);
      color: var(--blue-main);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    /* Quick Facts */
    .fact-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--blue-pale);
      font-size: 0.88rem;
    }
    .fact-row:last-child { border-bottom: none; }
    .fact-row .fact-key { color: #6B84B0; font-weight: 500; }
    .fact-row .fact-val { color: var(--text-dark); font-weight: 600; text-align: right; }

    /* Rating */
    .rating-box {
      text-align: center;
      padding: 1rem 0;
    }
    .rating-score {
      font-size: 3rem;
      font-weight: 900;
      color: var(--yellow-main);
      line-height: 1;
    }
    .rating-label { font-size: 0.85rem; color: #6B84B0; margin-top: 4px; }
    .stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 8px 0;
    }
    .star {
      width: 16px; height: 16px;
      background: var(--yellow-main);
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    }
    .star.half { opacity: 0.4; }

    /* ===== INFO BANNER ===== */
    .info-banner {
      background: var(--blue-main);
      padding: 3rem 5%;
    }
    .info-banner-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    .info-stat {
      text-align: center;
      padding: 1.5rem;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .info-stat .num {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--yellow-main);
      line-height: 1;
    }
    .info-stat .lbl {
      font-size: 0.85rem;
      color: var(--blue-pale);
      margin-top: 6px;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--blue-dark);
      padding: 3rem 5% 2rem;
      border-top: 3px solid var(--yellow-main);
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: var(--col-main) var(--col-side);
      gap: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .footer-brand { color: var(--white); font-weight: 800; font-size: 1.1rem; margin-bottom: 0.75rem; }
    .footer-desc { color: var(--blue-pale); font-size: 0.88rem; line-height: 1.7; }
    .footer-links h4 { color: var(--yellow-main); font-size: 0.85rem; letter-spacing: 0.5px; margin-bottom: 1rem; text-transform: uppercase; }
    .footer-links ul { list-style: none; }
    .footer-links ul li { margin-bottom: 0.5rem; }
    .footer-links ul li a { color: var(--blue-pale); font-size: 0.88rem; transition: color 0.2s; }
    .footer-links ul li a:hover { color: var(--yellow-main); text-decoration: none; }
    .footer-copy {
      max-width: 1200px;
      margin: 1.5rem auto 0;
      color: #5A7AB0;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .hero-inner,
      .main-wrap,
      .footer-inner,
      .info-banner-inner { grid-template-columns: 1fr; }
      .hero-stats { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .hero-stats .stat-divider { display: none; }
      .sidebar { position: static; }
      .role-grid { grid-template-columns: repeat(2, 1fr); }
      .info-banner-inner { grid-template-columns: repeat(2, 1fr); }
      .navbar-nav { display: none; }
      .info-banner-inner { grid-template-columns: repeat(2,1fr); }
    }

<!-- MAIN CONTENT -->
  <main class="main-wrap">

    <!-- ARTICLE -->
    <article class="article-content">

      <!-- TENTANG -->
      <section class="section-block" id="tentang">
        <div class="section-label"><h2>Apa Itu Mobile Legends?</h2></div>
        <p>
          Mobile Legends: Bang Bang (MLBB) adalah game MOBA (Multiplayer Online Battle Arena)
          yang dikembangkan oleh Moonton dan dirilis pada tahun 2016. Sejak peluncurannya,
          MLBB berhasil merebut hati jutaan pemain di seluruh dunia, terutama di kawasan Asia Tenggara.
        </p>
        <p>
          Dalam setiap pertandingan, dua tim beranggotakan 5 pemain bersaing untuk menghancurkan
          <strong>Nexus</strong> (markas inti) lawan. Pemain mengendalikan karakter yang disebut
          <strong>Hero</strong>, masing-masing dengan kemampuan unik dan peran strategis berbeda.
          Pertandingan rata-rata berlangsung antara 10 hingga 20 menit, menjadikannya ideal
          untuk sesi gaming cepat di perangkat mobile.
        </p>

        <div class="quote-block">
          <p>
            "Mobile Legends bukan sekadar game — ini adalah arena di mana strategi,
            kerja tim, dan refleks bertemu dalam harmoni sempurna di genggaman tangan Anda."
          </p>
        </div>
      </section>

      <!-- HERO ROLES -->
      <section class="section-block" id="hero-list">
        <div class="section-label"><h2>Peran Hero dalam Permainan</h2></div>
        <p>
          Setiap hero memiliki peran spesifik yang menentukan posisi dan kontribusinya
          di dalam pertandingan. Memahami peran ini adalah kunci kemenangan tim.
        </p>

        <div class="role-grid">
          <div class="role-card">
            <div class="role-icon tank">🛡️</div>
            <h3>Tank</h3>
            <p>Penahan garis depan, memiliki HP tinggi dan pertahanan kuat.</p>
          </div>
          <div class="role-card">
            <div class="role-icon mage">🔮</div>
